<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Player</title>
    <script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';</script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        const apiAuth = "https://corsproxy.io/?" + encodeURIComponent("https://beta.m-fixer.net/rest-api/v130/check_user_online_status?user_id=27206&MacAddress=TP1A.220905.001");
        const videoUrl = "http://edge-2.m-fixer.net:8088/stream/ais/rockentertainment/master.m3u8";
        const apiKey = "59tgtpiim7387jsrm9asvjr";

        async function start() {
            try {
                // ขั้นตอน "เปิดทาง" เพื่อยืนยัน IP กับเซิร์ฟเวอร์
                await fetch(apiAuth, {
                    headers: { 'api-key': apiKey, 'user-agent': 'Dart/3.10 (dart:io)' }
                });
                setTimeout(initPlayer, 500); // รอให้เซิร์ฟเวอร์รับ IP แป๊บหนึ่ง
            } catch (e) {
                initPlayer(); // ถ้า API ติดปัญหา ให้ลองเล่นวิดีโอเลย
            }
        }

        function initPlayer() {
            jwplayer("player").setup({
                playlist: [{ "sources": [{ "file": videoUrl, "type": "hls" }] }],
                width: "100%",
                height: "100%",
                autostart: true,
                hlsjsConfig: {
                    xhrSetup: function(xhr) {
                        xhr.setRequestHeader('User-Agent', 'Dart/3.10 (dart:io)');
                    }
                }
            });
        }
        start();
    </script>
</body>
</html>
