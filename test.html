<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bein TH1 - Updated</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';</script>
</head>
<body>
    <div id="player"></div>

    <script>
        const apiUrl = "https://beta.m-fixer.net/rest-api/v130/check_user_online_status?user_id=27206&MacAddress=TP1A.220905.001";
        const videoUrl = "https://edge-2.m-fixer.net:8088/stream/ais/rockaction/master.m3u8";
        const apiKey = "59tgtpiim7387jsrm9asvjr"; // จากรูปที่คุณแนบมา

        // ฟังก์ชันสำหรับเรียก API ก่อนเล่น
        async function checkAuthAndPlay() {
            try {
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'api-key': apiKey,
                        'user-agent': 'Dart/3.10 (dart:io)',
                        'accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // หาก API อนุมัติ (Status 200) ให้เริ่ม Load Player
                    initPlayer(videoUrl);
                } else {
                    console.error("API Auth Failed");
                    alert("สิทธิ์การใช้งานไม่ถูกต้อง");
                }
            } catch (error) {
                console.error("Error connecting to API:", error);
            }
        }

        function initPlayer(fileUrl) {
            var playerInstance = jwplayer("player");
            playerInstance.setup({
                playlist: [{
                    "image": "https://dl.dropboxusercontent.com/scl/fi/bxuir4s9rwq0e7k9ietbp/1778338275301.png?rlkey=euud1x4oh8507sicnk8l78to7",
                    "sources": [{
                        "type": "hls",
                        "file": fileUrl,
                        "label": "Rock Action"
                    }]
                }],
                width: "100%",
                aspectratio: "16:9",
                autostart: true
            });
        }

        // เรียกใช้งานฟังก์ชัน
        checkAuthAndPlay();
    </script>
</body>
</html>
