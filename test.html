        async function checkAuthAndPlay() {
            try {
                console.log("Checking Auth via Proxy...");
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'api-key': apiKey,
                        'user-agent': 'Dart/3.10 (dart:io)',
                        'accept': 'application/json'
                    }
                });

                if (response.ok) {
                    console.log("Auth Success!");
                    initPlayer(videoUrl);
                } else {
                    console.warn("Auth Server returned error:", response.status);
                    // หาก API ไม่ผ่าน แต่ยังอยากลองเสี่ยงเล่นวิดีโอ ให้เปิดบรรทัดล่างนี้
                    initPlayer(videoUrl); 
                }
            } catch (error) {
                console.error("Connection Error:", error);
                // กรณี Proxy ล่ม หรือโดนบล็อก ลองสั่งเล่นวิดีโอไปเลย
                initPlayer(videoUrl);
            }
        }
