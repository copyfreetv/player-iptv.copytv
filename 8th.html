<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrueID HLS Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    background: #000;

    overflow: hidden;

}

#video {

    width: 100%;
    height: 100%;

    background: #000;

}

#status {

    position: absolute;

    top: 10px;
    left: 10px;

    z-index: 9999;

    color: white;

    background: rgba(0,0,0,0.7);

    padding: 10px;

    border-radius: 6px;

    font-family: Arial;

    font-size: 14px;

}

</style>

</head>

<body>

<div id="status">
Loading...
</div>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
></video>

<script>

const video = document.getElementById('video');

const statusBox = document.getElementById('status');

const streamUrl =
'https://cdn941.stm.trueid.net/p301aes/d62_multi_tv_high_ott.smil/playlist.m3u8?appid=antv1&type=live&visitor=mobile&drm=aes&uid=wtxlfgnhab&did=NjUxMDg0ZmY2Yw&mpass=zOzVizWWp2mYR__iyaQyeuBOARiJdwOjul_1wVloPGP2-m5TD-q5wOoYz-FO5wBLUBz2y_GoILm79gQlBFmlOCAgBjfNy0tn6GPIAQKAIDn-7Q&sid=1d55ea24ba&rt=1779603354&ds=25200&tk=wexzQ9SgEJk4-DPKLnJmSrWBGi06Nw7j-EVIPQeim_U';

function setStatus(text) {

    console.log(text);

    statusBox.innerHTML = text;

}

if (Hls.isSupported()) {

    const hls = new Hls({

        debug: true,

        enableWorker: true,

        lowLatencyMode: false,

        backBufferLength: 90,

        maxBufferLength: 30,

        maxMaxBufferLength: 60,

        liveSyncDurationCount: 3,

        liveMaxLatencyDurationCount: 10,

        fragLoadingTimeOut: 20000,

        manifestLoadingTimeOut: 10000,

        levelLoadingTimeOut: 10000,

        startFragPrefetch: true

    });

    hls.loadSource(streamUrl);

    hls.attachMedia(video);

    hls.on(Hls.Events.MEDIA_ATTACHED, function () {

        setStatus('Media attached');

    });

    hls.on(Hls.Events.MANIFEST_LOADING, function () {

        setStatus('Loading manifest...');

    });

    hls.on(Hls.Events.MANIFEST_PARSED, function () {

        setStatus('Manifest loaded');

        video.play()
        .then(() => {

            setStatus('Playing');

        })
        .catch(err => {

            setStatus('Autoplay blocked');

            console.error(err);

        });

    });

    hls.on(Hls.Events.FRAG_PARSING_ERROR, function(event, data) {

        console.log("FRAG PARSING ERROR", data);

        setStatus("FRAG PARSE ERROR");

    });

    hls.on(Hls.Events.BUFFER_APPENDING_ERROR, function(event, data) {

        console.log("BUFFER ERROR", data);

        setStatus("BUFFER ERROR");

    });

    hls.on(Hls.Events.MEDIA_ERROR, function(event, data) {

        console.log("MEDIA ERROR", data);

        setStatus("MEDIA ERROR");

    });

    hls.on(Hls.Events.ERROR, function(event, data) {

        console.log(data);

        setStatus(
            'ERROR: ' +
            data.type +
            ' | ' +
            data.details
        );

        if (data.fatal) {

            switch(data.type) {

                case Hls.ErrorTypes.NETWORK_ERROR:

                    setStatus('Fatal network error');

                    hls.startLoad();

                    break;

                case Hls.ErrorTypes.MEDIA_ERROR:

                    setStatus('Recovering media error');

                    hls.recoverMediaError();

                    break;

                default:

                    setStatus('Destroying player');

                    hls.destroy();

                    break;

            }

        }

    });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {

    video.src = streamUrl;

    video.addEventListener('loadedmetadata', function () {

        video.play();

    });

} else {

    setStatus('HLS not supported');

}

</script>

</body>
</html>
