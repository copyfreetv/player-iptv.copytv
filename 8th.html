<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrueID Native Player</title>

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    background: black;

    overflow: hidden;

    font-family: Arial;

}

#video {

    width: 100%;
    height: 100%;

    background: black;

}

#status {

    position: absolute;

    top: 10px;
    left: 10px;

    z-index: 9999;

    color: white;

    background: rgba(0,0,0,0.7);

    padding: 10px 14px;

    border-radius: 8px;

    font-size: 14px;

}

#reloadBtn {

    position: absolute;

    top: 10px;
    right: 10px;

    z-index: 9999;

    padding: 10px 16px;

    border: none;

    border-radius: 8px;

    background: #111;

    color: white;

    cursor: pointer;

}

#reloadBtn:hover {

    background: #222;

}

</style>

</head>

<body>

<div id="status">
Loading stream...
</div>

<button id="reloadBtn">
Reload
</button>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
></video>

<script>

const video = document.getElementById('video');

const statusBox = document.getElementById('status');

const reloadBtn = document.getElementById('reloadBtn');

const streamUrl =
'https://cdn941.stm.trueid.net/p301aes/d62_multi_tv_high_ott.smil/playlist.m3u8?appid=antv1&type=live&visitor=mobile&drm=aes&uid=wtxlfgnhab&did=NjUxMDg0ZmY2Yw&mpass=zOzVizWWp2mYR__iyaQyeuBOARiJdwOjul_1wVloPGP2-m5TD-q5wOoYz-FO5wBLUBz2y_GoILm79gQlBFmlOCAgBjfNy0tn6GPIAQKAIDn-7Q&sid=1d55ea24ba&rt=1779603354&ds=25200&tk=wexzQ9SgEJk4-DPKLnJmSrWBGi06Nw7j-EVIPQeim_U';

function setStatus(text) {

    console.log(text);

    statusBox.innerHTML = text;

}

function loadVideo() {

    setStatus('Loading stream...');

    video.src = streamUrl;

    video.load();

}

reloadBtn.addEventListener('click', function () {

    loadVideo();

});

video.addEventListener('loadstart', function () {

    setStatus('Load Start');

});

video.addEventListener('loadedmetadata', function () {

    setStatus('Metadata Loaded');

    video.play()
    .then(() => {

        setStatus('Playing');

    })
    .catch((err) => {

        console.log(err);

        setStatus('Autoplay blocked');

    });

});

video.addEventListener('canplay', function () {

    setStatus('Can Play');

});

video.addEventListener('playing', function () {

    setStatus('Playing Stream');

});

video.addEventListener('waiting', function () {

    setStatus('Buffering...');

});

video.addEventListener('stalled', function () {

    setStatus('Stream Stalled');

});

video.addEventListener('pause', function () {

    setStatus('Paused');

});

video.addEventListener('ended', function () {

    setStatus('Stream Ended');

});

video.addEventListener('error', function () {

    const mediaError = video.error;

    console.log(mediaError);

    if (mediaError) {

        switch(mediaError.code) {

            case mediaError.MEDIA_ERR_ABORTED:
                setStatus('Playback Aborted');
                break;

            case mediaError.MEDIA_ERR_NETWORK:
                setStatus('Network Error');
                break;

            case mediaError.MEDIA_ERR_DECODE:
                setStatus('Decode Error');
                break;

            case mediaError.MEDIA_ERR_SRC_NOT_SUPPORTED:
                setStatus('Format Not Supported');
                break;

            default:
                setStatus('Unknown Error');
                break;

        }

    } else {

        setStatus('Unknown Video Error');

    }

});

loadVideo();

</script>

</body>

</html>
