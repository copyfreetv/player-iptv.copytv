<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrueID Stream Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    background: #000;

    overflow: hidden;

    font-family: Arial;

}

#video {

    width: 100%;
    height: 100%;

    background: black;

}

#status {

    position: absolute;

    top: 10px;
    left: 10px;

    z-index: 9999;

    color: white;

    background: rgba(0,0,0,0.7);

    padding: 10px 14px;

    border-radius: 8px;

    font-size: 14px;

}

#reloadBtn {

    position: absolute;

    top: 10px;
    right: 10px;

    z-index: 9999;

    padding: 10px 16px;

    border: none;

    border-radius: 8px;

    background: #111;

    color: white;

    cursor: pointer;

}

#reloadBtn:hover {

    background: #222;

}

</style>

</head>

<body>

<div id="status">
Loading stream...
</div>

<button id="reloadBtn">
Reload
</button>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
></video>

<script>

const video = document.getElementById('video');

const statusBox = document.getElementById('status');

const reloadBtn = document.getElementById('reloadBtn');

const streamUrl =
'https://cdn081.stm.trueid.net/p202aes/d83_multi_m_auto_aes_tvn.smil/chunklist_w57425043_b96000_ao_sltha_t64VGhhaQ==.m3u8?appid=tvn&type=live&visitor=mobile&drm=aes&uid=88839359&did=ZTU3ODE1NDliZTY5MDg2OQ&mpass=HPcxPE14-muIukvSU6BfWaRFVfotA91CQOMMu3LSLaNPDGxQZePDlDM6eKWlYywcQdPM6Qb0zyKNXSEMVlkrCCAgWaZ_B3qJeIH8pinMuH9QuQ&sid=79fce1f915&rt=1779607451&ds=25200&prd=V3lKVVVFeEJWRWxPVlUwaVhRfDY&tk=pQfXYT5KiPA11u8OYyGFiM96Rf3R8Uynxlxl1Rsy1kk';

function setStatus(text) {

    console.log(text);

    statusBox.innerHTML = text;

}

function loadWithHLS() {

    const hls = new Hls({

        debug: true,

        enableWorker: true,

        lowLatencyMode: false,

        backBufferLength: 90,

        maxBufferLength: 30,

        maxMaxBufferLength: 60,

        liveSyncDurationCount: 3,

        liveMaxLatencyDurationCount: 10,

        fragLoadingTimeOut: 20000,

        manifestLoadingTimeOut: 10000,

        levelLoadingTimeOut: 10000,

        startFragPrefetch: true

    });

    hls.loadSource(streamUrl);

    hls.attachMedia(video);

    hls.on(Hls.Events.MEDIA_ATTACHED, function () {

        setStatus('Media attached');

    });

    hls.on(Hls.Events.MANIFEST_LOADING, function () {

        setStatus('Loading manifest...');

    });

    hls.on(Hls.Events.MANIFEST_PARSED, function () {

        setStatus('Manifest loaded');

        video.play()
        .then(() => {

            setStatus('Playing');

        })
        .catch(err => {

            console.log(err);

            setStatus('Autoplay blocked');

        });

    });

    hls.on(Hls.Events.ERROR, function(event, data) {

        console.log(data);

        setStatus(
            'ERROR: ' +
            data.type +
            ' | ' +
            data.details
        );

        if (data.fatal) {

            switch(data.type) {

                case Hls.ErrorTypes.NETWORK_ERROR:

                    setStatus('Recovering network error');

                    hls.startLoad();

                    break;

                case Hls.ErrorTypes.MEDIA_ERROR:

                    setStatus('Recovering media error');

                    hls.recoverMediaError();

                    break;

                default:

                    setStatus('Destroying player');

                    hls.destroy();

                    break;

            }

        }

    });

}

function loadNative() {

    video.src = streamUrl;

    video.load();

    video.addEventListener('loadedmetadata', function () {

        video.play();

    });

}

function loadPlayer() {

    setStatus('Loading stream...');

    if (Hls.isSupported()) {

        loadWithHLS();

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {

        loadNative();

    } else {

        setStatus('HLS not supported');

    }

}

reloadBtn.addEventListener('click', function () {

    loadPlayer();

});

video.addEventListener('playing', function () {

    setStatus('Playing stream');

});

video.addEventListener('waiting', function () {

    setStatus('Buffering...');

});

video.addEventListener('stalled', function () {

    setStatus('Stream stalled');

});

video.addEventListener('pause', function () {

    setStatus('Paused');

});

video.addEventListener('error', function () {

    console.log(video.error);

    setStatus('Video decode error');

});

loadPlayer();

</script>

</body>

</html>
